server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Anthropic caps request bodies at 32 MB and each inline image at 5 MB
  # (base64 blows that up ~33%), so a single 5 MB JPEG arrives as ~6.7 MB
  # of JSON. Default nginx client_max_body_size is 1 MB, which silently 413s
  # any vision request. Lift to 64 MB so /v1/messages with multiple images
  # and /v1/files multipart uploads both go through.
  client_max_body_size 64m;
  client_body_buffer_size 1m;
  client_body_timeout 120s;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets: long-cache with immutable
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API + v1 proxied to the backend service
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    # $http_host preserves the original Host header (including port); $host strips the port.
    # The install script reads X-Forwarded-Host to emit the correct RELAY_BASE_URL.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  location /v1/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE streaming
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';
    chunked_transfer_encoding on;
    proxy_read_timeout 600s;
  }

  # Metrics: locked down at the nginx level too. If you expose this externally,
  # protect with an IP allowlist or HTTP basic auth here.
  location /metrics {
    proxy_pass http://backend:8080/metrics;
    proxy_set_header Host $http_host;
    proxy_set_header Authorization $http_authorization;
  }
}
